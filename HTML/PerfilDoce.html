<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Mi Universidad</title> 
    <link rel="stylesheet" href="../css/styleForBD.css">
    <link rel="icon" href="../Imagenes/MIUniversidadLogo.png" type="image/png"> 
</head>
<body>

    <header class="main-header">
        <div class="top-bar">
            <div class="header-container">
                <div class="left-group">
                    <img src="../Imagenes/Gemini_Generated_Image_6zhd806zhd806zhd-removebg-preview.png" alt="Logo UAGRO" class="university-logo">
                </div>
                <div class="right-group">
                    <h1 class="top-title">Perfil del Docente</h1>
                </div>
            </div>
        </div>

        <div class="id-bar">
            <div class="header-container">
                <div class="left-group id-content">
                    <div class="user-avatar-circle" id="profile-initial">D</div> 
                    <h1 class="user-id-text">Usuario: <span class="student-name" id="profile-name">Cargando...</span></h1>
                </div>
                <div class="right-group">
                    <button id="logoutBtn" class="btn-logout">Cerrar Sesión</button>
                </div>
            </div>
        </div>
    </header>

    <section>
        <div class="form-container">
            <div class="form-header">
                <img src="../Imagenes/MIUniversidadLogo.png" alt="Logo" class="form-logo">
                <h2>Mi Perfil Académico</h2>
                <p class="form-subtitle">Datos registrados en el sistema</p>
            </div>

            <div class="profile-details" style="text-align: left; margin-bottom: 20px;">
                <div style="margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 8px;">
                    <label style="font-weight: bold; color: #365652; display: block; font-size: 0.85em;">NOMBRE DE USUARIO:</label>
                    <span id="display-username" style="font-size: 1.1em; color: #333;">Cargando...</span>
                </div>
                
                <div style="margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 8px;">
                    <label style="font-weight: bold; color: #365652; display: block; font-size: 0.85em;">CORREO INSTITUCIONAL:</label>
                    <span id="display-email" style="font-size: 1.1em; color: #333;">Cargando...</span>
                </div>

                <div style="margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 8px;">
                    <label style="font-weight: bold; color: #365652; display: block; font-size: 0.85em;">ROL DE USUARIO:</label>
                    <span id="display-role" style="font-size: 1.1em; color: #333;">Docente</span>
                </div>
            </div>

            <hr class="separator">

            <div class="quick-actions">
                <p><strong>Navegación:</strong></p>
                <button id="btnVerCursos" class="btn-submit" style="margin-top: 10px;">Ver mis cursos</button>
                <button onclick="location.href='HomeBDDocen.html'" class="btn-submit" style="margin-top: 5px; background-color: #365652;">Volver al Inicio</button>
            </div>
        </div>
    </section>

    <script src="../js/perfilDocente.js"></script>
</body>
</html>
