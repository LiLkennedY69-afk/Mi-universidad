<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Mi Universidad</title> 
    <link rel="stylesheet" href="../css/styleForBD.css">
    <link rel="icon" href="../Imagenes/MIUniversidadLogo.png" type="image/png"> 
</head>
<body>

    <header class="main-header">
        <div class="top-bar">
            <div class="header-container">
                <div class="left-group">
                    <img src="../Imagenes/Gemini_Generated_Image_6zhd806zhd806zhd-removebg-preview.png" alt="Logo UAGRO" class="university-logo">
                </div>
                <div class="right-group">
                    <h1 class="top-title">Mi Universidad</h1>
                </div>
            </div>
        </div>

        <div class="id-bar">
            <div class="header-container">
                <div class="left-group id-content">
                    <div class="user-avatar-circle">U</div> 
                    <h1 class="user-id-text">Usuario: <span class="student-name">Invitado</span></h1>
                </div>
            </div>
        </div>
    </header>

    <section>
        <div class="form-container">
            <div class="form-header">
                <img src="../Imagenes/MIUniversidadLogo.png" alt="Logo" class="form-logo">
                <h2>Crear Cuenta</h2>
                <p class="form-subtitle">Portal de Registro</p>
            </div>

            <form id="signupForm">
                <label for="username">Nombre de Usuario</label>
                <input type="text" placeholder="Ej. Juan Pérez" id="username" required autofocus>

                <label for="email">Correo Institucional</label>
                <input type="email" placeholder="ejemploa@gmail.com" id="email" required> 

                <label for="password">Contraseña</label>
                <input type="password" placeholder="••••••••" id="password" required> 

                <label for="confirm-password">Confirmar Contraseña</label>
                <input type="password" placeholder="••••••••" id="confirm-password" required> 

                <input type="submit" value="REGISTRARSE" class="btn-submit"> 
            </form>
        </div>

        <p class="footer-link">¿Ya tienes una cuenta? <a href="Iniciar_sesionBD.html">Iniciar Sesión</a></p>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/signupBD.js"></script>
</body>
</html>
