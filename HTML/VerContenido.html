<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contenido del Curso - Mi Universidad</title>
    <link rel="stylesheet" href="../css/styleForBD.css">
    <link rel="icon" href="../Imagenes/MIUniversidadLogo.png" type="image/png">
</head>
<body>
    <header class="main-header">
        <div class="top-bar">
            <div class="header-container">
                <div class="left-group">
                    <img src="../Imagenes/Gemini_Generated_Image_6zhd806zhd806zhd-removebg-preview.png" alt="Logo UAGRO" class="university-logo">
                </div>
                <div class="right-group">
                    <h1 class="top-title" id="curso-titulo">Contenido del Curso</h1>
                </div>
            </div>
        </div>
    </header>

    <section>
        <div class="form-container" style="margin-top: 50px; max-width: 600px;">
            <div class="form-header">
                <img src="../Imagenes/MIUniversidadLogo.png" alt="Logo" class="form-logo">
                <h2 id="tema-principal">Cargando...</h2>
                <p id="descripcion-curso" class="form-subtitle">Espera un momento mientras obtenemos los detalles.</p>
            </div>

            <div id="material-estudio" style="text-align: left; padding: 15px; color: #333; line-height: 1.6;">
                </div>

            <button onclick="window.history.back()" class="btn-submit" style="background-color: #666; margin-top: 20px;">VOLVER A CURSOS</button>
        </div>
    </section>

    <script src="../js/verContenido.js"></script>
</body>
</html>
