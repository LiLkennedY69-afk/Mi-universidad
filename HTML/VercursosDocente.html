<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Maestro</title>
    <link rel="stylesheet" href="../css/styleForBD.css">
    <link rel="icon" href="../Imagenes/MIUniversidadLogo.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <header class="main-header">
        <div class="top-bar">
            <div class="header-container">
                <div class="left-group">
                    <img src="../Imagenes/Gemini_Generated_Image_6zhd806zhd806zhd-removebg-preview.png" alt="Logo UAGRO" class="university-logo">
                </div>
                <div class="right-group">
                    <h1 class="top-title">Panel de Control Docente</h1>
                </div>
            </div>
        </div>

        <div class="id-bar">
            <div class="header-container">
                <div class="left-group id-content">
                    <div class="user-avatar-circle">M</div> 
                    <h1 class="user-id-text">Bienvenido, Maestro: <span id="teacher-name">Cargando...</span></h1>
                </div>
                <div class="right-group">
                    <button id="logoutBtn" class="btn-logout">Cerrar Sesión</button>
                </div>
            </div>
        </div>
    </header>

   <section>
    <div class="Cursos-container">
        <div class="form-header">
            <h2>Gestión de Cursos</h2>
            <p class="form-subtitle">Aquí puedes administrar las materias que impartes.</p>
        </div>

        <div style="display: flex; justify-content: center; margin-bottom: 2em;">
            <button id="btnAgregarCurso" class="btn-submit" style="width: auto; padding: 12px 30px; background-color: #365652; font-size: 1.1em; cursor: pointer;">
                + Agregar Nuevo Curso
            </button>
        </div>

        <div class="dashboard-content">
            <h3 style="text-align: left; margin-bottom: 15px; font-family: 'CiscoSans', sans-serif;">
                Cursos Impartidos
            </h3>

            <div class="Carrusel-maestro" id="contenedorCursos"> 
                </div>
        </div>
    </div>
</section>

    <script src="../js/DocenteVerCursosBD.js"></script>
</body>
</html>
