<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Cursos - Mi Universidad</title> 
    <link rel="stylesheet" href="../css/styleForBD.css">
    <link rel="icon" href="../Imagenes/MIUniversidadLogo.png" type="image/png"> 
</head>
<body>

    <header class="main-header">
        <div class="top-bar">
            <div class="header-container">
                <div class="left-group">
                    <img src="../Imagenes/Gemini_Generated_Image_6zhd806zhd806zhd-removebg-preview.png" alt="Logo UAGRO" class="university-logo">
                </div>
                <div class="right-group">
                    <h1 class="top-title">Gestión de Cursos</h1>
                </div>
            </div>
        </div>

        <div class="id-bar">
            <div class="header-container">
                <div class="left-group id-content">
                    <div class="user-avatar-circle" id="profile-initial">U</div> 
                    <h1 class="user-id-text">Administrador: <span class="student-name" id="profile-name">Cargando...</span></h1>
                </div>
                <div class="right-group">
                    <button id="logoutBtn" class="btn-logout">Cerrar Sesión</button>
                </div>
            </div>
        </div>
    </header>

    <section>
        <div class="Cursos-container">
            <div class="form-header">
                <img src="../Imagenes/MIUniversidadLogo.png" alt="Logo" class="form-logo">
                <h2>Cursos Disponibles</h2>
                <p class="form-subtitle">Administración de la oferta académica actual.</p>
            </div>

            <div class="dashboard-content">
                <div class="Cursos-carrusel" id="contenedorCursos">
                    </div> 
            </div>

            <div style="display: flex; justify-content: center; margin-top: 20px;">
                <button onclick="window.location.href='HomeAdmin.html'" class="btn-submit" style="background-color: #4a4a4a; width: 200px;">Volver al Inicio</button>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/gestionCursos.js"></script>
</body>
</html>
