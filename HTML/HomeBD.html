<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - Estudiante</title>
    <link rel="stylesheet" href="../css/styleForBD.css">
    <link rel="icon" href="../Imagenes/MIUniversidadLogo.png" type="image/png">
</head>
<body>
    <header class="main-header">
        <div class="top-bar">
            <div class="header-container">
                <div class="left-group">
                    <img src="../Imagenes/Gemini_Generated_Image_6zhd806zhd806zhd-removebg-preview.png" alt="Logo UAGRO" class="university-logo">
                </div>
                <h1 class="top-title">Portal del Estudiante</h1>
            </div>
        </div>
        <div class="id-bar">
            <div class="header-container">
                <div class="left-group id-content">
                    <div class="user-avatar-circle" id="profile-initial">E</div>
                    <h1 class="user-id-text">Estudiante: <span id="profile-name">Cargando...</span></h1>
                </div>
                <button id="logoutBtn" class="btn-logout">Cerrar Sesión</button>
            </div>
        </div>
    </header>

    <main>
        <div class="home-card">
            <img src="../Imagenes/MIUniversidadLogo.png" alt="Logo" class="home-logo">
            <h2 class="welcome-title">¡Hola de nuevo!</h2>
            <p class="form-subtitle">Has ingresado exitosamente al portal.</p>
            
            <p class="welcome-desc">
                Bienvenido al sistema de bases de datos de Mi Universidad. 
                Aquí podrás visualizar tus cursos inscritos y materiales académicos.
            </p>

            <hr class="separator">
            
            <p><strong>Acciones Rápidas:</strong></p>
            <div class="quick-actions-grid">
                <button id="VerCursosEstudiante" class="btn-home btn-primary">Ver mis cursos</button>
                <button id="Perfil" class="btn-home btn-secondary">Ir al perfil</button>
            </div>
        </div>
    </main>

    <script src="../js/homeBD.js"></script>
</body>
</html>
